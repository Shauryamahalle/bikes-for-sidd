<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoShowcase India | Ultra Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757;
            --primary-glow: rgba(255, 71, 87, 0.4);
            --bg: #0b0c10;
            --surface: #1f2833;
            --surface-light: #2a3644;
            --text: #ffffff;
            --muted: #8a9bb2;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--surface-light); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            background: radial-gradient(circle at top, #1a1f2e 0%, var(--bg) 100%); 
            color: var(--text); 
            min-height: 100vh;
        }
        
        header { 
            padding: 80px 20px 60px; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        header h1 { 
            font-size: 3.5rem; 
            margin: 0; 
            font-weight: 800;
            background: linear-gradient(45deg, #fff, #8a9bb2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        header p { 
            color: var(--primary); 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-size: 0.85rem; 
            margin-top: 10px; 
        }

        .container { 
            max-width: 1300px; 
            margin: 50px auto; 
            padding: 0 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 35px; 
        }

        /* Upgraded Card Styling */
        .bike-card { 
            background: rgba(31, 40, 51, 0.6); 
            backdrop-filter: blur(10px);
            border-radius: 24px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; 
            position: relative;
        }
        .bike-card:hover { 
            transform: translateY(-10px) scale(1.02); 
            border-color: var(--primary); 
            box-shadow: 0 20px 40px var(--primary-glow); 
        }
        
        .card-img { 
            height: 220px; 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center; 
            background-color: rgba(0,0,0,0.2); 
            margin: 15px; 
            border-radius: 18px; 
            transition: transform 0.5s ease;
        }
        .bike-card:hover .card-img {
            transform: scale(1.05);
        }

        .card-content { padding: 0 25px 25px; }
        .badge { 
            background: rgba(255, 71, 87, 0.1); 
            padding: 6px 14px; 
            border-radius: 50px; 
            font-size: 0.75rem; 
            font-weight: 700;
            color: var(--primary); 
            margin-bottom: 12px; 
            display: inline-block; 
            border: 1px solid rgba(255, 71, 87, 0.3);
        }
        .card-content h3 { margin: 5px 0 10px; font-size: 1.5rem; font-weight: 700; }
        .card-price { color: var(--text); font-size: 1.2rem; font-weight: 800; }
        .card-price span { color: var(--muted); font-size: 0.9rem; font-weight: 400; }

        /* Upgraded Glassmorphism Modal */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background: rgba(11, 12, 16, 0.85); 
            backdrop-filter: blur(15px); 
            overflow-y: auto; 
        }
        .modal-content { 
            background: var(--surface); 
            margin: 4% auto; 
            width: 90%; 
            max-width: 1000px; 
            border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative; 
            display: flex; 
            flex-wrap: wrap; 
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        @keyframes modalPop { 
            from { opacity: 0; transform: scale(0.9) translateY(20px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }
        
        .close-modal { 
            position: absolute; 
            right: 25px; top: 20px; 
            font-size: 35px; 
            color: var(--muted); 
            cursor: pointer; 
            z-index: 10; 
            transition: color 0.3s;
        }
        .close-modal:hover { color: var(--primary); }
        
        .m-left { 
            flex: 1.2; 
            min-width: 320px; 
            padding: 40px; 
            background: rgba(0,0,0,0.2); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 30px 0 0 30px;
        }
        .m-right { flex: 1; min-width: 320px; padding: 50px 40px; }

        /* Dashboard-style Specs */
        .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .spec-pill { 
            background: rgba(0,0,0,0.3); 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .spec-pill label { display: block; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .spec-pill span { font-weight: 700; font-size: 1rem; color: #fff; }
        
        .pc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .pc-box { padding: 18px; border-radius: 16px; font-size: 0.85rem; line-height: 1.5; }
        .pc-box strong { display: block; margin-bottom: 5px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .pros { background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.3); color: #2ecc71; }
        .cons { background: rgba(255, 71, 87, 0.1); border: 1px solid rgba(255, 71, 87, 0.3); color: #ff4757; }

            display: block; 
            text-align: center; 
            background: var(--primary); 
            color: white; 
            text-decoration: none; 
            padding: 18px; 
            border-radius: 16px;
