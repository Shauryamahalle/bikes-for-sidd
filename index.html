<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoShowcase India | Premium Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Your Custom Color Palette */
            --bg-solid: #2C2B30;
            --primary: #F58F7C;
            --primary-glow: rgba(245, 143, 124, 0.3);
            --accent: #F2C4CE;
            --surface: #4F4F51;
            --text: #ffffff;
            --muted: #D6D6D6;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-solid); }
        ::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            background-color: var(--bg-solid);
            color: var(--text); 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- UPGRADED HEADER --- */
        header { 
            position: relative;
            padding: 120px 20px 80px; 
            text-align: center; 
            background: linear-gradient(to bottom, #38373d, var(--bg-solid));
            overflow: hidden;
            border-bottom: 1px solid rgba(214, 214, 214, 0.05);
        }

        header::before {
            content: "";
            position: absolute;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            z-index: 0;
            filter: blur(60px);
        }

        .header-content { position: relative; z-index: 1; }

        header p { 
            color: var(--accent); 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 6px; 
            font-size: 0.75rem; 
            margin-bottom: 15px;
            display: inline-block;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 5px;
        }

        header h1 { 
            font-size: clamp(2.5rem, 8vw, 5rem); 
            margin: 0; 
            font-weight: 800;
            line-height: 0.9;
            text-transform: uppercase;
            color: var(--text);
            letter-spacing: -2px;
        }

        header h1 span {
            display: block;
            font-weight: 300;
            font-size: 0.4em;
            letter-spacing: 15px;
            margin-top: 10px;
            color: var(--muted);
            text-indent: 15px;
        }

        .header-divider {
            width: 60px;
            height: 4px;
            background: var(--primary);
            margin: 30px auto 0;
            border-radius: 2px;
        }

        /* --- GRID & CARDS --- */
        .container { 
            max-width: 1300px; 
            margin: 50px auto; 
            padding: 0 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 35px; 
        }

        .bike-card { 
            background: rgba(79, 79, 81, 0.4); 
            backdrop-filter: blur(10px);
            border-radius: 24px; 
            overflow: hidden; 
            border: 1px solid rgba(214, 214, 214, 0.1); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; 
        }

        .bike-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--primary); 
            box-shadow: 0 20px 40px var(--primary-glow); 
        }
        
        .card-img { 
            height: 220px; 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center; 
            background-color: rgba(0,0,0,0.2); 
            margin: 15px; 
            border-radius: 18px; 
        }

        .card-content { padding: 0 25px 25px; }
        
        .badge { 
            background: rgba(242, 196, 206, 0.1); 
            padding: 6px 14px; 
            border-radius: 50px; 
            font-size: 0.75rem; 
            font-weight: 700;
            color: var(--accent); 
            margin-bottom: 12px; 
            display: inline-block; 
            border: 1px solid rgba(242, 196, 206, 0.2);
        }

        .card-content h3 { margin: 5px 0 10px; font-size: 1.5rem; font-weight: 700; }
        .card-price { color: var(--text); font-size: 1.2rem; font-weight: 800; }
        .card-price span { color: var(--muted); font-size: 0.9rem; font-weight: 400; }

        /* --- MODAL --- */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background: rgba(44, 43, 48, 0.95); 
            backdrop-filter: blur(15px); 
            overflow-y: auto; 
        }

        .modal-content { 
            background: var(--bg-solid); 
            margin: 4% auto; 
            width: 90%; 
            max-width: 1000px; 
            border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            position: relative; 
            display: flex; 
            flex-wrap: wrap; 
            animation: modalPop 0.4s ease; 
        }

        @keyframes modalPop { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .close-modal { position: absolute; right: 25px; top: 20px; font-size: 35px; color: var(--muted); cursor: pointer; z-index: 10; }
        
        .m-left { flex: 1.2; min-width: 320px; padding: 40px; background: rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; }
        .m-right { flex: 1; min-width: 320px; padding: 50px 40px; }

        .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .spec-pill { 
            background: rgba(79, 79, 81, 0.3); 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .spec-pill label { display: block; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 5px; }
        .spec-pill span { font-weight: 700; color: #fff; }
        
        .pc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .pc-box { padding: 18px; border-radius: 16px; font-size: 0.85rem; }
        .pros { background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.3); color: #2ecc71; }
        .cons { background: rgba(245, 143, 124, 0.1); border: 1px solid rgba(245, 143, 124, 0.3); color: var(--primary); }
        
        .btn-visit { 
            display: block; text-align: center; background: var(--primary); color: #1a1a1a; 
            text-decoration: none; padding: 18px; border-radius: 16px; font-weight: 800; 
            text-transform: uppercase; margin-top: 30px; transition: 0.3s; 
        }
        .btn-visit:hover { background: var(--accent); transform: translateY(-3px); }

        @media (max-width: 768px) { .m-left, .m-right { flex: 100%; } .spec-grid, .pc-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <p>Est. 2026 • Premium Collection</p>
        <h1>MotoShowcase <span>India</span></h1>
        <div class="header-divider"></div>
    </div>
</header>

<div class="container" id="bikeGrid"></div>

<div id="bikeModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="modalBody" style="display: flex; flex-wrap: wrap; width: 100%;"></div>
    </div>
</div>
