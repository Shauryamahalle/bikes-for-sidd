<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoShowcase India | Ultra Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757;
            --primary-glow: rgba(255, 71, 87, 0.4);
            --bg: #0b0c10;
            --surface: #1f2833;
            --surface-light: #2a3644;
            --text: #ffffff;
            --muted: #8a9bb2;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--surface-light); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            background: radial-gradient(circle at top, #1a1f2e 0%, var(--bg) 100%); 
            color: var(--text); 
            min-height: 100vh;
        }
        
        header { 
            padding: 80px 20px 60px; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        header h1 { 
            font-size: 3.5rem; 
            margin: 0; 
            font-weight: 800;
            background: linear-gradient(45deg, #fff, #8a9bb2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        header p { 
            color: var(--primary); 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-size: 0.85rem; 
            margin-top: 10px; 
        }

        .container { 
            max-width: 1300px; 
            margin: 50px auto; 
            padding: 0 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 35px; 
        }

        /* Upgraded Card Styling */
        .bike-card { 
            background: rgba(31, 40, 51, 0.6); 
            backdrop-filter: blur(10px);
            border-radius: 24px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; 
            position: relative;
        }
        .bike-card:hover { 
            transform: translateY(-10px) scale(1.02); 
            border-color: var(--primary); 
            box-shadow: 0 20px 40px var(--primary-glow); 
        }
        
        .card-img { 
            height: 220px; 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center; 
            background-color: rgba(0,0,0,0.2); 
            margin: 15px; 
            border-radius: 18px; 
            transition: transform 0.5s ease;
        }
        .bike-card:hover .card-img {
            transform: scale(1.05);
        }

        .card-content { padding: 0 25px 25px; }
        .badge { 
            background: rgba(255, 71, 87, 0.1); 
            padding: 6px 14px; 
            border-radius: 50px; 
            font-size: 0.75rem; 
            font-weight: 700;
            color: var(--primary); 
            margin-bottom: 12px; 
            display: inline-block; 
            border: 1px solid rgba(255, 71, 87, 0.3);
        }
        .card-content h3 { margin: 5px 0 10px; font-size: 1.5rem; font-weight: 700; }
        .card-price { color: var(--text); font-size: 1.2rem; font-weight: 800; }
        .card-price span { color: var(--muted); font-size: 0.9rem; font-weight: 400; }

        /* Upgraded Glassmorphism Modal */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background: rgba(11, 12, 16, 0.85); 
            backdrop-filter: blur(15px); 
            overflow-y: auto; 
        }
        .modal-content { 
            background: var(--surface); 
            margin: 4% auto; 
            width: 90%; 
            max-width: 1000px; 
            border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative; 
            display: flex; 
            flex-wrap: wrap; 
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        @keyframes modalPop { 
            from { opacity: 0; transform: scale(0.9) translateY(20px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }
        
        .close-modal { 
            position: absolute; 
            right: 25px; top: 20px; 
            font-size: 35px; 
            color: var(--muted); 
            cursor: pointer; 
            z-index: 10; 
            transition: color 0.3s;
        }
        .close-modal:hover { color: var(--primary); }
        
        .m-left { 
            flex: 1.2; 
            min-width: 320px; 
            padding: 40px; 
            background: rgba(0,0,0,0.2); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 30px 0 0 30px;
        }
        .m-right { flex: 1; min-width: 320px; padding: 50px 40px; }

        /* Dashboard-style Specs */
        .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .spec-pill { 
            background: rgba(0,0,0,0.3); 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .spec-pill label { display: block; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .spec-pill span { font-weight: 700; font-size: 1rem; color: #fff; }
        
        .pc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .pc-box { padding: 18px; border-radius: 16px; font-size: 0.85rem; line-height: 1.5; }
        .pc-box strong { display: block; margin-bottom: 5px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .pros { background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.3); color: #2ecc71; }
        .cons { background: rgba(255, 71, 87, 0.1); border: 1px solid rgba(255, 71, 87, 0.3); color: #ff4757; }
        
        .btn-visit { 
            display: block; 
            text-align: center; 
            background: var(--primary); 
            color: white; 
            text-decoration: none; 
            padding: 18px; 
            border-radius: 16px; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 30px; 
            transition: all 0.3s; 
            box-shadow: 0 10px 20px var(--primary-glow);
        }
        .btn-visit:hover { 
            background: #ff2e43; 
            transform: translateY(-3px); 
            box-shadow: 0 15px 25px rgba(255, 71, 87, 0.6);
        }

        @media (max-width: 768px) { 
            header h1 { font-size: 2.5rem; }
            .m-left { border-radius: 30px 30px 0 0; padding: 30px; }
            .m-right { padding: 30px; }
            .spec-grid, .pc-grid { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>

<header>
    <p>Premium 2026 Collection</p>
    <h1>MotoShowcase India</h1>
</header>

<div class="container" id="bikeGrid"></div>

<div id="bikeModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="modalBody" style="display: flex; flex-wrap: wrap; width: 100%;"></div>
    </div>
</div>

<script>
const bikes = [
    { name: "Triumph Speed 400", tag: "Roadster", price: "₹ 2.31", img: "speed400.jpg", engine: "398cc Liquid-cooled", power: "40 PS", torque: "37.5 Nm", weight: "179 kg", pros: ["Build Quality", "Mid-range punch"], cons: ["Compact size"], url: "https://www.triumphmotorcycles.in/" },
    { name: "Honda CB350", tag: "Classic", price: "₹ 1.97", img: "cb350.jfif", engine: "348cc Air-cooled", power: "21 PS", torque: "29.4 Nm", weight: "187 kg", pros: ["Refinement", "Retro soul"], cons: ["Tall gearing"], url: "https://www.honda2wheelersindia.com/" },
    { name: "RE Guerrilla 450", tag: "Modern Roadster", price: "₹ 2.49", img: "guerrilla 450.webp", engine: "452cc Liquid-cooled", power: "40 PS", torque: "40 Nm", weight: "185 kg", pros: ["Agility", "TFT with Navigation"], cons: ["11L Tank"], url: "https://www.royalenfield.com/" },
    { name: "Harley-Davidson X440", tag: "Cruiser", price: "₹ 2.35", img: "X440.jpg", engine: "440cc Air-Oil Cooled", power: "27 bhp", torque: "38 Nm", weight: "190.5 kg", pros: ["Exhaust Note", "Torque"], cons: ["Boxy styling"], url: "https://www.harley-davidsonx440.com/" },
    { name: "Scrambler 400 XC", tag: "Scrambler", price: "₹ 2.59", img: "Scrambler 400X.jfif", engine: "398cc Liquid-cooled", power: "40 PS", torque: "37.5 Nm", weight: "185 kg", pros: ["Dual Purpose", "Stance"], cons: ["Tall Seat"], url: "https://www.triumphmotorcycles.in/" },
    { name: "Yamaha XSR155", tag: "Neo-Retro", price: "₹ 1.59", img: "XSR155.jpg", engine: "155cc VVA Engine", power: "19 PS", torque: "14.7 Nm", weight: "134 kg", pros: ["Efficiency", "Light weight"], cons: ["Low Top Speed"], url: "https://www.yamaha-motor-india.com/" },
    { name: "Honda CB350RS", tag: "Scrambler-Roadster", price: "₹ 2.15", img: "CB350RS.webp", engine: "348cc Air-cooled", power: "21 PS", torque: "30 Nm", weight: "179 kg", pros: ["Handling", "Aesthetics"], cons: ["Stiff Ride"], url: "https://www.honda2wheelersindia.com/" },
    { name: "Triumph Tracker 400", tag: "Flat Tracker", price: "₹ 2.50", img: "Tracker400.jpg", engine: "398cc Liquid-cooled", power: "40 PS", torque: "37.5 Nm", weight: "175 kg", pros: ["Agility", "Unique looks"], cons: ["Limited Pillion comfort"], url: "https://www.triumphmotorcycles.in/" }
];

const grid = document.getElementById('bikeGrid');
const modal = document.getElementById('bikeModal');
const modalBody = document.getElementById('modalBody');

bikes.forEach(bike => {
    const card = document.createElement('div');
    card.className = 'bike-card';
    card.innerHTML = `
        <div class="card-img" style="background-image: url('${bike.img}')"></div>
        <div class="card-content">
            <span class="badge">${bike.tag}</span>
            <h3>${bike.name}</h3>
            <p class="card-price">${bike.price} <span>Lakh</span></p>
        </div>
    `;
    card.onclick = () => {
        modalBody.innerHTML = `
            <div class="m-left"><img src="${bike.img}" style="width:100%; border-radius:15px; max-width:400px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));"></div>
            <div class="m-right">
                <span class="badge">${bike.tag}</span>
                <h2 style="margin:10px 0 5px; font-size: 2.2rem;">${bike.name}</h2>
                <h3 style="color:var(--primary); margin:0 0 20px; font-size: 1.5rem;">${bike.price} Lakh</h3>
                
                <div class="spec-grid">
                    <div class="spec-pill"><label>Engine</label><span>${bike.engine}</span></div>
                    <div class="spec-pill"><label>Power</label><span>${bike.power}</span></div>
                    <div class="spec-pill"><label>Torque</label><span>${bike.torque}</span></div>
                    <div class="spec-pill"><label>Weight</label><span>${bike.weight}</span></div>
                </div>

                <div class="pc-grid">
                    <div class="pc-box pros"><strong>⊕ Pros</strong> ${bike.pros.join(' &bull; ')}</div>
                    <div class="pc-box cons"><strong>⊖ Cons</strong> ${bike.cons.join(' &bull; ')}</div>
                </div>
                
                <a href="${bike.url}" target="_blank" class="btn-visit">Explore Official Site</a>
            </div>
        `;
        modal.style.display = "block";
        document.body.style.overflow = "hidden";
    };
    grid.appendChild(card);
});

document.querySelector('.close-modal').onclick = () => {
    modal.style.display = "none";
    document.body.style.overflow = "auto";
};
window.onclick = (e) => { 
    if(e.target == modal) {
        modal.style.display = "none";
        document.body.style.overflow = "auto";
    }
};
</script>
</body>
</html>
