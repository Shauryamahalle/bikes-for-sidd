<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoShowcase India | Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Updated to your specific color */
            --bg-solid: #2C2B30;
            --primary: #F58F7C;
            --primary-glow: rgba(245, 143, 124, 0.3);
            --accent: #F2C4CE;
            --surface: #4F4F51;
            --text: #ffffff;
            --muted: #D6D6D6;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-solid); }
        ::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            background-color: var(--bg-solid);
            color: var(--text); 
            min-height: 100vh;
        }
        
        header { 
            padding: 80px 20px 60px; 
            text-align: center; 
            background: linear-gradient(to bottom, #38373d, var(--bg-solid));
            border-bottom: 1px solid rgba(214, 214, 214, 0.05); 
        }
        header h1 { 
            font-size: 3.5rem; 
            margin: 0; 
            font-weight: 800;
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        header p { 
            color: var(--primary); 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-size: 0.85rem; 
            margin-top: 10px; 
        }

        .container { 
            max-width: 1300px; 
            margin: 50px auto; 
            padding: 0 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 35px; 
        }

        .bike-card { 
            background: rgba(79, 79, 81, 0.4); 
            backdrop-filter: blur(10px);
            border-radius: 24px; 
            overflow: hidden; 
            border: 1px solid rgba(214, 214, 214, 0.1); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; 
        }
        .bike-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--primary); 
            box-shadow: 0 20px 40px var(--primary-glow); 
        }
        
        .card-img { 
            height: 220px; 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center; 
            background-color: rgba(0,0,0,0.2); 
            margin: 15px; 
            border-radius: 18px; 
        }

        .card-content { padding: 0 25px 25px; }
        .badge { 
            background: rgba(242, 196, 206, 0.1); 
            padding: 6px 14px; 
            border-radius: 50px; 
            font-size: 0.75rem; 
            font-weight: 700;
            color: var(--accent); 
            margin-bottom: 12px; 
            display: inline-block; 
            border: 1px solid rgba(242, 196, 206, 0.2);
        }
        .card-content h3 { margin: 5px 0 10px; font-size: 1.5rem; }
        .card-price { color: var(--text); font-size: 1.2rem; font-weight: 800; }
        .card-price span { color: var(--muted); font-size: 0.9rem; font-weight: 400; }

        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background: rgba(44, 43, 48, 0.95); 
            backdrop-filter: blur(15px); 
            overflow-y: auto; 
        }
        .modal-content { 
            background: var(--bg-solid); 
            margin: 4% auto; 
            width: 90%; 
            max-width: 1000px; 
            border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            position: relative; 
            display: flex; 
            flex-wrap: wrap; 
            animation: modalPop 0.4s ease; 
        }
        @keyframes modalPop { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .close-modal { position: absolute; right: 25px; top: 20px; font-size: 35px; color: var(--muted); cursor: pointer; z-index: 10; }
        
        .m-left { flex: 1.2; min-width: 320px; padding: 40px; background: rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; }
        .m-right { flex: 1; min-width: 320px; padding: 50px 40px; }

        .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .spec-pill { 
            background: rgba(79, 79, 81, 0.3); 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .spec-pill label { display: block; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 5px; }
        .spec-pill span { font-weight: 700; color: #fff; }
        
        .pc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .pc-box { padding: 18px; border-radius: 16px; font-size: 0.85rem; }
        .pros { background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.3); color: #2ecc71; }
        .cons { background: rgba(245, 143, 124, 0.1); border: 1px solid rgba(245, 143, 124, 0.3); color: var(--primary); }
        
        .btn-visit { 
            display: block; text-align: center; background: var(--primary); color: #1a1a1a; 
            text-decoration: none; padding: 18px; border-radius: 16px; font-weight: 800; 
            text-transform: uppercase; margin-top: 30px; transition: 0.3s; 
        }
        .btn-visit:hover { background: var(--accent); transform: translateY(-3px); }

        @media (max-width: 768px) { .m-left, .m-right { flex: 100%; } .spec-grid, .pc-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <p>Premium 2026 Collection</p>
    <h1>MotoShowcase India</h1>
</header>

<div class="container" id="bikeGrid"></div>

<div id="bikeModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="modalBody" style="display: flex; flex-wrap: wrap; width: 100%;"></div>
    </div>
</div>

<script>
const bikes = [
    { name: "Triumph Speed 400", tag: "Roadster", price: "2.31", img: "speed400.jpg", engine: "398cc Liquid-cooled", power: "40 PS", torque: "37.5 Nm", weight: "179 kg", pros: ["Build Quality", "Mid-range punch"], cons: ["Compact size"], url: "https://www.triumphmotorcycles.in/" },
    { name: "Honda CB350", tag: "Classic", price: "1.97", img: "cb350.jfif", engine: "348cc Air-cooled", power: "21 PS", torque: "29.4 Nm", weight: "187 kg", pros: ["Refinement", "Retro soul"], cons: ["Tall gearing"], url: "https://www.honda2wheelersindia.com/" },
    { name: "RE Guerrilla 450", tag: "Modern Roadster", price: "2.49", img: "guerrilla 450.webp", engine: "452cc Liquid-cooled", power: "40 PS", torque: "40 Nm", weight: "185 kg", pros: ["Agility", "TFT with Navigation"], cons: ["11L Tank"], url: "https://www.royalenfield.com/" },
    { name: "Harley-Davidson X440", tag: "Cruiser", price: "2.35", img: "X440.jpg", engine: "440cc Air-Oil Cooled", power: "27 bhp", torque: "38 Nm", weight: "190.5 kg", pros: ["Exhaust Note", "Torque"], cons: ["Boxy styling"], url: "https://www.harley-davidsonx440.com/" },
    { name: "Scrambler 400 XC", tag: "Scrambler", price: "2.59", img: "Scrambler 400X.jfif", engine: "398cc Liquid-cooled", power: "40 PS", torque: "37.5 Nm", weight: "185 kg", pros: ["Dual Purpose", "Stance"], cons: ["Tall Seat"], url: "https://www.triumphmotorcycles.in/" },
    { name: "Yamaha XSR155", tag: "Neo-Retro", price: "1.59", img: "XRS155.jpg", engine: "155cc VVA Engine", power: "19 PS", torque: "14.7 Nm", weight: "134 kg", pros: ["Efficiency", "Light weight"], cons: ["Low Top Speed"], url: "https://www.yamaha-motor-india.com/" },
    { name: "Honda CB350RS", tag: "Scrambler-Roadster", price: "2.15", img: "CB350RS.webp", engine: "348cc Air-cooled", power: "21 PS", torque: "30 Nm", weight: "179 kg", pros: ["Handling", "Aesthetics"], cons: ["Stiff Ride"], url: "https://www.honda2wheelersindia.com/" },
    { name: "Triumph Tracker 400", tag: "Flat Tracker", price: "2.50", img: "Tracker400.jpg", engine: "398cc Liquid-cooled", power: "40 PS", torque: "37.5 Nm", weight: "175 kg", pros: ["Agility", "Unique looks"], cons: ["Limited Pillion comfort"], url: "https://www.triumphmotorcycles.in/" }
];

const grid = document.getElementById('bikeGrid');
const modal = document.getElementById('bikeModal');
const modalBody = document.getElementById('modalBody');

bikes.forEach(bike => {
    const card = document.createElement('div');
    card.className = 'bike-card';
    card.innerHTML = `
        <div class="card-img" style="background-image: url('${bike.img}')"></div>
        <div class="card-content">
            <span class="badge">${bike.tag}</span>
            <h3>${bike.name}</h3>
            <p class="card-price">₹ ${bike.price} <span>Lakh</span></p>
        </div>
    `;
    card.onclick = () => {
        modalBody.innerHTML = `
            <div class="m-left"><img src="${bike.img}" style="width:100%; border-radius:15px; max-width:400px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));"></div>
            <div class="m-right">
                <span class="badge">${bike.tag}</span>
                <h2 style="margin:10px 0 5px; font-size: 2.2rem;">${bike.name}</h2>
                <h3 style="color:var(--primary); margin:0 0 20px; font-size: 1.5rem;">₹ ${bike.price} Lakh</h3>
                <div class="spec-grid">
                    <div class="spec-pill"><label>Engine</label><span>${bike.engine}</span></div>
                    <div class="spec-pill"><label>Power</label><span>${bike.power}</span></div>
                    <div class="spec-pill"><label>Torque</label><span>${bike.torque}</span></div>
                    <div class="spec-pill"><label>Weight</label><span>${bike.weight}</span></div>
                </div>
                <div class="pc-grid">
                    <div class="pc-box pros"><strong>⊕ Pros</strong> ${bike.pros.join(' &bull; ')}</div>
                    <div class="pc-box cons"><strong>⊖ Cons</strong> ${bike.cons.join(' &bull; ')}</div>
                </div>
                <a href="${bike.url}" target="_blank" class="btn-visit">Explore Official Site</a>
            </div>
        `;
        modal.style.display = "block";
        document.body.style.overflow = "hidden";
    };
    grid.appendChild(card);
});

document.querySelector('.close-modal').onclick = () => { modal.style.display = "none"; document.body.style.overflow = "auto"; };
window.onclick = (e) => { if(e.target == modal) { modal.style.display = "none"; document.body.style.overflow = "auto"; } };
</script>
</body>
</html>
