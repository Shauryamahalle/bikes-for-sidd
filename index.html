<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="referrer" content="no-referrer">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoShowcase India 2026 | Detailed Edition</title>
    <style>
        :root {
            --primary: #d32f2f;
            --secondary: #1a1a1a;
            --accent: #ffc107;
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #333;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            scroll-behavior: smooth;
        }

        /* Header */
        header {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1558981403-c5f9899a28bc?auto=format&fit=crop&q=80&w=1200');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 100px 20px;
            text-align: center;
        }

        header h1 { font-size: 3.5rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        header p { font-size: 1.2rem; opacity: 0.8; margin-top: 10px; }

        /* Grid */
        .container {
            max-width: 1200px;
            margin: -50px auto 50px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        /* Card Styling */
        .bike-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .bike-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

        .card-img {
            height: 200px;
            background-color: #eee;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: transform 0.5s ease;
        }

        .bike-card:hover .card-img { transform: scale(1.05); }

        .card-content { padding: 20px; flex-grow: 1; }
        .card-content h3 { margin: 0 0 10px; font-size: 1.4rem; color: var(--secondary); }
        .card-price { color: var(--primary); font-weight: 700; font-size: 1.1rem; margin-bottom: 15px; display: block; }
        
        .view-details-btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        /* Modal Styling */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            overflow-y: auto;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            width: 90%;
            max-width: 1000px;
            border-radius: 20px;
            position: relative;
            animation: slideUp 0.4s ease-out;
            overflow: hidden;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close-modal {
            position: absolute;
            right: 25px;
            top: 20px;
            font-size: 35px;
            color: #333;
            cursor: pointer;
            z-index: 10;
        }

        .modal-body { display: grid; grid-template-columns: 1fr 1.2fr; }
        
        .modal-gallery {
            background: #f9f9f9;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #eee;
        }

        .main-modal-img { max-width: 100%; height: auto; border-radius: 10px; }

        .modal-info { padding: 40px; }
        .modal-info h2 { margin-top: 0; font-size: 2.2rem; color: var(--secondary); }
        
        .spec-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .spec-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
        }

        .spec-item label { display: block; font-size: 0.8rem; color: #777; text-transform: uppercase; }
        .spec-item span { font-weight: 600; font-size: 1rem; }

        .advantage-section { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .list-box h4 { margin-bottom: 10px; }
        .list-box.pros { color: #2e7d32; }
        .list-box.cons { color: #c62828; }

        .official-link {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 850px) {
            .modal-body { grid-template-columns: 1fr; }
            .modal-gallery { border-right: none; border-bottom: 1px solid #eee; }
        }
    </style>
</head>
<body>

</header>

<div class="container" id="bikeGrid">
    <!-- Cards will be injected here by JS -->
</div>

<!-- Modal -->
<div id="bikeModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div class="modal-body" id="modalContent">
            <!-- Content Injected by JS -->
        </div>
    </div>
</div>

const grid = document.getElementById('bikeGrid');
const modal = document.getElementById('bikeModal');
const modalContent = document.getElementById('modalContent');
const closeModal = document.querySelector('.close-modal');

// Create Cards
bikes.forEach(bike => {
    const card = document.createElement('div');
    card.className = 'bike-card';
    card.innerHTML = `
        <div class="card-img" style="background-image: url('${bike.img}')"></div>
        <div class="card-content">
            <h3>${bike.name}</h3>
            <span class="card-price">${bike.price}</span>
            <p style="font-size: 0.9rem; color: #666;">${bike.engine} | ${bike.weight}</p>
            <button class="view-details-btn">View Full Details</button>
        </div>
    `;
    card.onclick = () => openBikeDetails(bike);
    grid.appendChild(card);
});

function openBikeDetails(bike) {
    modalContent.innerHTML = `
        <div class="modal-gallery">
            <img src="${bike.img}" class="main-modal-img" alt="${bike.name}">
            <p style="margin-top:20px; font-style:italic; color:#666;">Official Colorway shown.</p>
        </div>
        <div class="modal-info">
            <h2>${bike.name}</h2>
            <span class="card-price" style="font-size: 1.5rem;">${bike.price} <small>(Ex-Showroom)</small></span>
            
            <div class="spec-grid">
                <div class="spec-item"><label>Engine</label><span>${bike.engine}</span></div>
                <div class="spec-item"><label>Max Power</label><span>${bike.power}</span></div>
                <div class="spec-item"><label>Max Torque</label><span>${bike.torque}</span></div>
                <div class="spec-item"><label>Kerb Weight</label><span>${bike.weight}</span></div>
                <div class="spec-item"><label>Seat Height</label><span>${bike.seat}</span></div>
                <div class="spec-item"><label>Fuel Tank</label><span>${bike.tank}</span></div>
            </div>

            <div class="list-box" style="background:#eee; padding:15px; border-radius:10px; margin-bottom:20px;">
                <h4 style="margin:0 0 5px 0;">Key Features</h4>
                <p style="margin:0; font-size:0.95rem;">${bike.features}</p>
            </div>

            <div class="advantage-section">
                <div class="list-box pros">
                    <h4>Advantages</h4>
                    <ul style="padding-left:20px; font-size:0.9rem;">
                        ${bike.pros.map(p => `<li>${p}</li>`).join('')}
                    </ul>
                </div>
                <div class="list-box cons">
                    <h4>Disadvantages</h4>
                    <ul style="padding-left:20px; font-size:0.9rem;">
                        ${bike.cons.map(c => `<li>${c}</li>`).join('')}
                    </ul>
                </div>
            </div>

            <a href="${bike.url}" target="_blank" class="official-link">Visit Official Website</a>
        </div>
    `;
    modal.style.display = "block";
    document.body.style.overflow = "hidden"; // Prevent background scroll
}

closeModal.onclick = () => {
    modal.style.display = "none";
    document.body.style.overflow = "auto";
};

window.onclick = (event) => {
    if (event.target == modal) {
        modal.style.display = "none";
        document.body.style.overflow = "auto";
    }
};
</script>

</body>
</html>
