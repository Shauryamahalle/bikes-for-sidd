<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoShowcase India 2026</title>
    <style>
        :root { --primary: #d32f2f; --secondary: #1a1a1a; --bg-color: #f4f4f9; --card-bg: #ffffff; }
        body { font-family: sans-serif; margin: 0; background-color: var(--bg-color); }
        header { background: #1a1a1a; color: white; padding: 60px 20px; text-align: center; }
        .container { max-width: 1200px; margin: -30px auto 50px; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .bike-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }
        .bike-card:hover { transform: translateY(-5px); }
        .card-img { height: 200px; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #f9f9f9; }
        .card-content { padding: 20px; }
        .card-price { color: var(--primary); font-weight: bold; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; width: 90%; max-width: 800px; border-radius: 20px; padding: 30px; position: relative; display: flex; flex-wrap: wrap; }
        .close-modal { position: absolute; right: 20px; top: 10px; font-size: 30px; cursor: pointer; }
        .modal-left { flex: 1; min-width: 300px; padding: 20px; }
        .modal-right { flex: 1; min-width: 300px; padding: 20px; }
        .spec-item { background: #f0f0f0; padding: 10px; margin: 5px 0; border-radius: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <h1>MotoShowcase India 2026</h1>
    <p>Live from Amravati - Interactive Bike Guide</p>
</header>

<div class="container" id="bikeGrid"></div>

<div id="bikeModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="modalBody" style="display: flex; flex-wrap: wrap; width: 100%;"></div>
    </div>
</div>

<script>
const bikes = [
    {
        name: "Triumph Speed 400",
        price: "₹ 2.32 Lakh",
        img: "https://images.weserv.nl/?url=https://media.triumphmotorcycles.co.uk/image/upload/f_auto,q_auto/sitecore%20india/motorcycles/modern-classics/speed-400/my24/speed-400-caspian-blue-storm-grey-lh.png",
        specs: ["398cc Liquid-cooled", "40 PS Power", "179 kg Weight", "803mm Seat"],
        url: "https://www.triumphmotorcycles.in/motorcycles/classic/speed-400"
    },
    {
        name: "Honda CB350",
        price: "₹ 1.97 Lakh",
        img: "https://images.weserv.nl/?url=https://www.honda2wheelersindia.com/assets/images/motorcycle/cb350/color/precious-red-metallic.png",
        specs: ["348cc Air-cooled", "21 PS Power", "187 kg Weight", "800mm Seat"],
        url: "https://www.honda2wheelersindia.com/motorcycle/CB350"
    },
    {
        name: "Royal Enfield Guerrilla 450",
        price: "₹ 2.39 Lakh",
        img: "https://images.weserv.nl/?url=https://www.royalenfield.com/content/dam/royal-enfield/india/motorcycles/guerrilla-450/colors/apex-red.png",
        specs: ["452cc Liquid-cooled", "40 PS Power", "185 kg Weight", "780mm Seat"],
        url: "https://www.royalenfield.com/in/en/motorcycles/guerrilla-450/"
    },
    {
        name: "Harley-Davidson X440",
        price: "₹ 2.39 Lakh",
        img: "https://images.weserv.nl/?url=https://www.harley-davidsonx440.com/assets/images/x440-s/360/matte-black/01.png",
        specs: ["440cc Air-Oil Cooled", "27 bhp Power", "190kg Weight", "805mm Seat"],
        url: "https://www.harley-davidsonx440.com/"
    },
    {
        name: "Scrambler 400 XC",
        price: "₹ 2.89 Lakh",
        img: "https://images.weserv.nl/?url=https://media.triumphmotorcycles.co.uk/image/upload/f_auto,q_auto/sitecore%20india/motorcycles/modern-classics/scrambler-400-x/my24/scrambler-400-x-matte-khaki-green-fusion-white-lh.png",
        specs: ["398cc Scrambler Tune", "40 PS Power", "185 kg Weight", "835mm Seat"],
        url: "https://www.triumphmotorcycles.in/motorcycles/classic/scrambler/scrambler-400-xc"
    }
];

const grid = document.getElementById('bikeGrid');
const modal = document.getElementById('bikeModal');
const modalBody = document.getElementById('modalBody');

bikes.forEach(bike => {
    const card = document.createElement('div');
    card.className = 'bike-card';
    card.innerHTML = `
        <div class="card-img" style="background-image: url('${bike.img}')"></div>
        <div class="card-content">
            <h3>${bike.name}</h3>
            <p class="card-price">${bike.price}</p>
        </div>
    `;
    card.onclick = () => {
        modalBody.innerHTML = `
            <div class="modal-left"><img src="${bike.img}" style="width:100%"></div>
            <div class="modal-right">
                <h2>${bike.name}</h2>
                ${bike.specs.map(s => `<div class="spec-item">${s}</div>`).join('')}
                <br><a href="${bike.url}" target="_blank" style="color:red; font-weight:bold;">Official Website →</a>
            </div>
        `;
        modal.style.display = "block";
    };
    grid.appendChild(card);
});

document.querySelector('.close-modal').onclick = () => modal.style.display = "none";
window.onclick = (e) => { if(e.target == modal) modal.style.display = "none"; };
</script>
</body>
</html>
