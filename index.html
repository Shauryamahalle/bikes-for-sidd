<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoShowcase India | 2026</title>
    <style>
        :root {
            --primary: #ff3e3e;
            --bg: #0f1012;
            --card: #1e2024;
            --text: #ffffff;
            --muted: #a0a0a0;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); }
        header { padding: 60px 20px; text-align: center; background: linear-gradient(to bottom, #1a1a1a, var(--bg)); }
        header h1 { font-size: 2.5rem; margin: 0; }
        header p { color: var(--primary); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }

        .container { max-width: 1300px; margin: 0 auto 50px; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }

        .bike-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #333; transition: 0.3s; cursor: pointer; }
        .bike-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        
        .card-img { height: 200px; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #161719; margin: 10px; border-radius: 15px; }
        .card-content { padding: 20px; }
        .badge { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 50px; font-size: 0.7rem; color: var(--muted); margin-bottom: 8px; display: inline-block; }
        .card-price { color: var(--primary); font-weight: 800; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); overflow-y: auto; }
        .modal-content { background: #1a1a1a; margin: 2% auto; width: 90%; max-width: 900px; border-radius: 25px; border: 1px solid #333; position: relative; display: flex; flex-wrap: wrap; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 35px; color: white; cursor: pointer; z-index: 10; }
        
        .m-left { flex: 1; min-width: 300px; padding: 30px; background: #151515; display: flex; align-items: center; justify-content: center; }
        .m-right { flex: 1; min-width: 300px; padding: 30px; }

        .spec-pill { background: #252525; padding: 10px; margin: 6px 0; border-radius: 10px; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .pc-box { padding: 12px; border-radius: 12px; font-size: 0.8rem; margin-top: 10px; }
        .pros { background: rgba(76, 175, 80, 0.1); border: 1px solid #4caf50; color: #81c784; }
        .cons { background: rgba(244, 67, 54, 0.1); border: 1px solid #f44336; color: #e57373; }
        .btn-visit { display: block; text-align: center; background: var(--primary); color: white; text-decoration: none; padding: 12px; border-radius: 10px; font-weight: bold; margin-top: 20px; }

        @media (max-width: 700px) { .m-left, .m-right { flex: 100%; } }
    </style>
</head>
<body>

<header>
    <h1>MotoShowcase India</h1>
    <p>Premium 2026 Collection</p>
</header>

<div class="container" id="bikeGrid"></div>

<div id="bikeModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="modalBody" style="display: flex; flex-wrap: wrap; width: 100%;"></div>
    </div>
</div>

<script>
const bikes = [
    {
        name: "Triumph Speed 400",
        tag: "Roadster",
        price: "₹ 2.40 Lakh",
        img: "speed400.jpg",
        engine: "398cc Liquid-cooled",
        power: "40 PS",
        weight: "179 kg",
        pros: ["Finish Quality", "Strong Mid-range"],
        cons: ["Compact for tall riders"],
        url: "https://www.triumphmotorcycles.in/"
    },
    {
        name: "Honda CB350",
        tag: "Classic Cruiser",
        price: "₹ 2.10 Lakh",
        img: "cb350.jfif",
        engine: "348cc Air-cooled",
        power: "21 PS",
        weight: "187 kg",
        pros: ["Refinement", "Relaxed Ergonomics"],
        cons: ["Tall Gearing"],
        url: "https://www.honda2wheelersindia.com/"
    },
    {
        name: "RE Guerrilla 450",
        tag: "Modern Roadster",
        price: "₹ 2.39 Lakh",
        img: "guerrilla 450.webp",
        engine: "452cc Liquid-cooled",
        power: "40 PS",
        weight: "185 kg",
        pros: ["Handling", "Google Maps TFT"],
        cons: ["Small 11L Tank"],
        url: "https://www.royalenfield.com/"
    },
    {
        name: "Harley-Davidson X440",
        tag: "Cruiser-Roadster",
        price: "₹ 2.39 Lakh",
        img: "X440.jpg",
        engine: "440cc Air-Oil Cooled",
        power: "27 bhp",
        weight: "190.5 kg",
        pros: ["Exhaust Note", "Torque"],
        cons: ["Boxy Design"],
        url: "https://www.harley-davidsonx440.com/"
    },
    {
        name: "Scrambler 400 XC",
        tag: "Scrambler",
        price: "₹ 2.64 Lakh",
        img: "Scrambler 400X.jfif",
        engine: "398cc Liquid-cooled",
        power: "40 PS",
        weight: "185 kg",
        pros: ["Off-road Capability", "Stance"],
        cons: ["Tall Seat Height"],
        url: "https://www.triumphmotorcycles.in/"
    },
    {
        name: "Yamaha XSR155",
        tag: "Neo-Retro",
        price: "₹ 1.40 Lakh",
        img: "xsr155.jpg",
        engine: "155cc VVA Engine",
        power: "19 PS",
        weight: "134 kg",
        pros: ["Fuel Efficient", "Lightweight"],
        cons: ["Small Engine"],
        url: "https://www.yamaha-motor-india.com/"
    },
    {
        name: "Honda CB350RS",
        tag: "Scrambler-Roadster",
        price: "₹ 2.15 Lakh",
        img: "cb350rs.jpg",
        engine: "348cc Air-cooled",
        power: "21 PS",
        weight: "179 kg",
        pros: ["Sporty Looks", "Build Quality"],
        cons: ["Stiff Suspension"],
        url: "https://www.honda2wheelersindia.com/"
    },
    {
        name: "Triumph Tracker 400",
        tag: "Flat Tracker",
        price: "₹ 2.50 Lakh",
        img: "tracker400.jpg",
        engine: "398cc Liquid-cooled",
        power: "40 PS",
        weight: "175 kg",
        pros: ["Unique Style", "Agility"],
        cons: ["Minimalist Comfort"],
        url: "https://www.triumphmotorcycles.in/"
    }
];

const grid = document.getElementById('bikeGrid');
const modal = document.getElementById('bikeModal');
const modalBody = document.getElementById('modalBody');

bikes.forEach(bike => {
    const card = document.createElement('div');
    card.className = 'bike-card';
    card.innerHTML = `
        <div class="card-img" style="background-image: url('${bike.img}')"></div>
        <div class="card-content">
            <span class="badge">${bike.tag}</span>
            <h3>${bike.name}</h3>
            <p class="card-price">${bike.price}</p>
        </div>
    `;
    card.onclick = () => {
        modalBody.innerHTML = `
            <div class="m-left">
                <img src="${bike.img}" style="width:100%; border-radius:15px; max-width:400px;">
            </div>
            <div class="m-right">
                <span class="badge" style="background:var(--primary); color:white;">${bike.tag}</span>
                <h2 style="margin:10px 0;">${bike.name}</h2>
                <div class="spec-pill"><span>Engine</span><span>${bike.engine}</span></div>
                <div class="spec-pill"><span>Power</span><span>${bike.power}</span></div>
                <div class="spec-pill"><span>Weight</span><span>${bike.weight}</span></div>
                <div class="pc-box pros"><strong>Pros:</strong> ${bike.pros.join(', ')}</div>
                <div class="pc-box cons"><strong>Cons:</strong> ${bike.cons.join(', ')}</div>
                <a href="${bike.url}" target="_blank" class="btn-visit">Visit Official Site</a>
            </div>
        `;
        modal.style.display = "block";
        document.body.style.overflow = "hidden";
    };
    grid.appendChild(card);
});

document.querySelector('.close-modal').onclick = () => {
    modal.style.display = "none";
    document.body.style.overflow = "auto";
};

window.onclick = (e) => { 
    if(e.target == modal) {
        modal.style.display = "none";
        document.body.style.overflow = "auto";
    }
};
</script>
</body>
</html>
